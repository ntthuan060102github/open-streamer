        items:
          $ref: '#/definitions/domain.MediaTrackInfo'
        type: array
    type: object
  manager.MediaSummary:
    properties:
      input_bitrate_kbps:
        type: integer
      inputs:
        items:
          $ref: '#/definitions/domain.MediaTrackInfo'
        type: array
      output_bitrate_kbps:
        type: integer
      outputs:
        items:
          $ref: '#/definitions/domain.MediaTrackInfo'
        type: array
    type: object
  manager.RuntimeStatus:
    properties:
      active_input_priority:
        type: integer
      exhausted:
        type: boolean
      inputs:
        items:
          $ref: '#/definitions/manager.InputHealthSnapshot'
        type: array
      media:
        allOf:
        - $ref: '#/definitions/manager.MediaSummary'
        description: |-
          Media is the UI-friendly summary of the current input → output track
          shape (what the dashboard renders as "Input media info / Output media
          info / 954kbit/s -> 2577kbit/s"). Populated by the API handler — the
          manager doesn't know the output config.
      override_input_priority:
        type: integer
      pipeline_active:
        type: boolean
      publisher:
        $ref: '#/definitions/publisher.RuntimeStatus'
      status:
        $ref: '#/definitions/domain.StreamStatus'
      switches:
        description: |-
          Switches is the rolling history of active-input changes (newest at
          index 0, capped at maxSwitchHistory). Stream-level — switches happen
          BETWEEN inputs, so this lives next to Inputs rather than inside one.
        items:
          $ref: '#/definitions/manager.SwitchEvent'
        type: array
      transcoder:
        $ref: '#/definitions/transcoder.RuntimeStatus'
    type: object
  manager.SwitchEvent:
    properties:
      at:
        type: string
      detail:
        description: |-
          Detail is human-readable extra context (error message, timeout
          duration, …). Empty for reasons that have no extra context (manual,
          failback, input_added, input_removed).
        type: string
      from:
        type: integer
      reason:
        $ref: '#/definitions/manager.SwitchReason'
      to:
        type: integer
    type: object
  manager.SwitchReason:
    enum:
    - initial
    - error
    - timeout
    - manual
    - failback
    - recovery
    - input_added
    - input_removed
    type: string
    x-enum-varnames:
    - SwitchReasonInitial
    - SwitchReasonError
    - SwitchReasonTimeout
    - SwitchReasonManual
    - SwitchReasonFailback
    - SwitchReasonRecovery
    - SwitchReasonInputAdded
    - SwitchReasonInputRemoved
  publisher.PushSnapshot:
    properties:
      attempt:
        type: integer
      connected_at:
        type: string
      errors:
        items:
          $ref: '#/definitions/domain.ErrorEntry'
        type: array
      status:
        $ref: '#/definitions/publisher.PushStatus'
      url:
        type: string
    type: object
  publisher.PushStatus:
    enum:
    - starting
    - active
    - reconnecting
    - failed
    type: string
    x-enum-varnames:
    - PushStatusStarting
    - PushStatusActive
    - PushStatusReconnecting
    - PushStatusFailed
  publisher.RuntimeStatus:
    properties:
      pushes:
        items:
          $ref: '#/definitions/publisher.PushSnapshot'
        type: array
    type: object
  transcoder.ProbeResult:
    properties:
      encoders:
        additionalProperties:
          additionalProperties:
            type: boolean
          type: object
        type: object
      errors:
        items:
          type: string
        type: array
      filters:
        additionalProperties:
          type: boolean
        type: object
      muxers:
        additionalProperties:
          type: boolean
        type: object
      ok:
        type: boolean
      path:
        type: string
      version:
        type: string
      warnings:
        items:
          type: string
        type: array
    type: object
  transcoder.ProfileSnapshot:
    properties:
      errors:
        items:
          $ref: '#/definitions/domain.ErrorEntry'
        type: array
      index:
        description: 0-based ladder index; track label = track_<index+1>
        type: integer
      restart_count:
        type: integer
      track:
        type: string
    type: object
  transcoder.RuntimeStatus:
    properties:
      profiles:
        items:
          $ref: '#/definitions/transcoder.ProfileSnapshot'
        type: array
    type: object
  version.Info:
    properties:
      built_at:
        type: string
      commit:
        type: string
      version:
        type: string
    type: object
  vod.FileEntry:
    properties:
      ingest_url:
        type: string
      is_dir:
        type: boolean
      mod_time_unix:
        type: integer
      name:
        type: string
      path:
        description: path relative to the mount root, with forward slashes
        type: string
      play_url:
        type: string
      size:
        type: integer
    type: object
info:
  contact: {}
  description: REST API for live stream configuration, ingest/publish lifecycle, DVR
    recordings, and event hooks.
  title: Open Streamer API
  version: "1.0"
paths:
  /config:
    get:
      description: Returns available hardware accelerators (OS-detected), static enum
        lists, publisher listener ports, and the current runtime GlobalConfig.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.ConfigData'
      summary: Get server configuration.
      tags:
      - system
    post:
      consumes:
      - application/json
      description: Merges the request body into the current GlobalConfig and applies
        it — services are started or stopped to match.
      parameters:
      - description: Partial configuration to merge
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.GlobalConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.ConfigUpdateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorResponse'
      summary: Partially update server configuration.
      tags:
      - system
  /config/defaults:
    get:
      description: Static values the server fills in for unset configuration fields.
        Use as form placeholders so users see real defaults instead of "default" text.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.configDefaultsResponse'
      summary: Get system configuration defaults.
      tags:
      - system
  /config/transcoder/probe:
    post:
      consumes:
      - application/json
      description: Inspects the binary at ffmpeg_path (empty = $PATH) and reports
        which required / optional encoders + muxers are available. Pure check — does
        not modify config.
      parameters:
      - description: Path to probe (empty = use $PATH)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.probeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transcoder.ProbeResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Probe an FFmpeg binary for app compatibility.
      tags:
      - system
  /config/yaml:
    get:
      description: Returns global_config, streams, and hooks bundled in a single YAML
        document. Pair with PUT /config/yaml to round-trip an editor.
      produces:
      - application/yaml
      responses:
        "200":
          description: YAML document
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get full system configuration as YAML
      tags:
      - system
    put:
      consumes:
      - application/yaml
      description: Replaces global_config, streams, and hooks with the request body.
        Validation errors are returned as a list. On success, the runtime manager
        + coordinator diff against the previous state and start/stop/restart services
        accordingly.
      parameters:
      - description: Full system configuration YAML document
        in: body
        name: body
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Replace full system configuration from YAML
      tags:
      - system
  /healthz:
    get:
      description: Returns 200 if the process is up.
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Liveness
      tags:
      - system
  /hooks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.HookList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: List hooks
      tags:
      - hooks
    post:
      consumes:
      - application/json
      parameters:
      - description: Hook configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.Hook'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/apidocs.HookData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Create hook
      tags:
      - hooks
  /hooks/{hid}:
    delete:
      parameters:
      - description: Hook ID
        in: path
        name: hid
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Delete hook
      tags:
      - hooks
    get:
      parameters:
      - description: Hook ID
        in: path
        name: hid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.HookData'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Get hook
      tags:
      - hooks
    put:
      consumes:
      - application/json
      parameters:
      - description: Hook ID
        in: path
        name: hid
        required: true
        type: string
      - description: Hook configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.Hook'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.HookData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Update hook
      tags:
      - hooks
  /hooks/{hid}/test:
    post:
      parameters:
      - description: Hook ID
        in: path
        name: hid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.HookTestData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Test hook delivery
      tags:
      - hooks
  /readyz:
    get:
      description: Returns 200 when the server accepts traffic (basic check).
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Readiness
      tags:
      - system
  /recordings/{rid}:
    get:
      parameters:
      - description: Recording ID (= stream code)
        in: path
        name: rid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.RecordingData'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Get recording
      tags:
      - recordings
  /recordings/{rid}/{file}:
    get:
      parameters:
      - description: Recording ID (= stream code)
        in: path
        name: rid
        required: true
        type: string
      - description: Segment filename (e.g. 000000.ts) or playlist.m3u8
        in: path
        name: file
        required: true
        type: string
      - description: 'Timeshift: absolute start (RFC3339). Implies M3U8 dispatch'
        in: query
        name: from
        type: string
      - description: 'Timeshift: relative start (seconds from recording start)'
        in: query
        name: offset_sec
        type: integer
      - description: 'Timeshift: window length in seconds (default: all remaining)'
        in: query
        name: duration
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Serve recording file (segment or playlist; timeshift via query)
      tags:
      - recordings
  /recordings/{rid}/info:
    get:
      parameters:
      - description: Recording ID (= stream code)
        in: path
        name: rid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: DVR recording info
      tags:
      - recordings
  /sessions:
    get:
      parameters:
      - description: Filter by protocol (hls|dash|rtmp|srt|rtsp)
        in: query
        name: proto
        type: string
      - description: Filter by status (active|closed)
        in: query
        name: status
        type: string
      - description: Max sessions to return (default 0 = no cap)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.SessionList'
      summary: List play sessions
      tags:
      - sessions
  /sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: kicked
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Kick a play session
      tags:
      - sessions
    get:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.PlaySession'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Get a play session by ID
      tags:
      - sessions
  /streams:
    get:
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.StreamList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: List streams
      tags:
      - streams
  /streams/{code}:
    delete:
      parameters:
      - description: Stream code
        in: path
        name: code
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Delete stream
      tags:
      - streams
    get:
      parameters:
      - description: Stream code (a-zA-Z0-9_)
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.StreamData'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Get stream
      tags:
      - streams
    post:
      consumes:
      - application/json
      parameters:
      - description: Stream code
        in: path
        name: code
        required: true
        type: string
      - description: Partial or full stream document
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/apidocs.StreamPutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.StreamData'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/apidocs.StreamData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Create or partial-update stream
      tags:
      - streams
  /streams/{code}/inputs/switch:
    post:
      parameters:
      - description: Stream code
        in: path
        name: code
        required: true
        type: string
      - description: Target input priority
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/apidocs.InputSwitchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.StreamActionData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Manual input switch
      tags:
      - streams
  /streams/{code}/recordings:
    get:
      parameters:
      - description: Stream code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.RecordingList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: List recordings by stream
      tags:
      - recordings
  /streams/{code}/restart:
    post:
      parameters:
      - description: Stream code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.StreamActionData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Restart stream pipeline
      tags:
      - streams
  /streams/{code}/sessions:
    get:
      parameters:
      - description: Stream code
        in: path
        name: code
        required: true
        type: string
      - description: Filter by protocol
        in: query
        name: proto
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Max sessions to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.SessionList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: List sessions for a stream
      tags:
      - sessions
  /vod:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.VODMountList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: List VOD mounts
      tags:
      - vod
    post:
      consumes:
      - application/json
      parameters:
      - description: VOD mount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.VODMount'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/apidocs.VODMountData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Create VOD mount
      tags:
      - vod
  /vod/{name}:
    delete:
      parameters:
      - description: Mount name
        in: path
        name: name
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Delete VOD mount
      tags:
      - vod
    get:
      parameters:
      - description: Mount name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.VODMountData'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Get VOD mount
      tags:
      - vod
    put:
      consumes:
      - application/json
      parameters:
      - description: Mount name
        in: path
        name: name
        required: true
        type: string
      - description: VOD mount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.VODMount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.VODMountData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: Update VOD mount
      tags:
      - vod
  /vod/{name}/files:
    get:
      parameters:
      - description: Mount name
        in: path
        name: name
        required: true
        type: string
      - description: Subdirectory (relative, no leading slash)
        in: query
        name: path
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidocs.VODFileList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidocs.ErrorBody'
      summary: List files in a VOD mount
      tags:
      - vod
