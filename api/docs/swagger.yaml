    type: string
    x-enum-varnames:
    - RecordingStatusRecording
    - RecordingStatusStopped
    - RecordingStatusFailed
  domain.ResizeMode:
    enum:
    - pad
    - crop
    - stretch
    - fit
    type: string
    x-enum-comments:
      ResizeModeCrop: 'fill: keep aspect, crop excess'
      ResizeModeFit: keep aspect, no padding (output may be smaller than W:H)
      ResizeModePad: 'letterbox: keep aspect, fill remainder with black'
      ResizeModeStretch: 'distort: scale to W:H, ignore source aspect'
    x-enum-descriptions:
    - 'letterbox: keep aspect, fill remainder with black'
    - 'fill: keep aspect, crop excess'
    - 'distort: scale to W:H, ignore source aspect'
    - keep aspect, no padding (output may be smaller than W:H)
    x-enum-varnames:
    - ResizeModePad
    - ResizeModeCrop
    - ResizeModeStretch
    - ResizeModeFit
  domain.SessionCloseReason:
    enum:
    - idle
    - client_gone
    - shutdown
    - kicked
    type: string
    x-enum-comments:
      SessionCloseClient: TCP/UDP peer closed (RTMP/SRT/RTSP)
      SessionCloseIdle: no activity within the configured idle window
      SessionCloseKicked: operator force-closed via API
      SessionCloseShutdown: server shutting down
    x-enum-descriptions:
    - no activity within the configured idle window
    - TCP/UDP peer closed (RTMP/SRT/RTSP)
    - server shutting down
    - operator force-closed via API
    x-enum-varnames:
