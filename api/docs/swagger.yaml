    - SessionCloseKicked
  domain.SessionNamedBy:
    enum:
    - token
    - config
    - fingerprint
    type: string
    x-enum-comments:
      SessionNamedByConfig: 'resolved from server-side config (future: signed URL)'
      SessionNamedByFingerprint: synthesised hash of ip+ua+stream
      SessionNamedByToken: resolved from a `token` query param
    x-enum-descriptions:
    - resolved from a `token` query param
    - 'resolved from server-side config (future: signed URL)'
    - synthesised hash of ip+ua+stream
    x-enum-varnames:
    - SessionNamedByToken
    - SessionNamedByConfig
    - SessionNamedByFingerprint
  domain.SessionProto:
    enum:
    - hls
    - dash
    - rtmp
    - srt
    - rtsp
    type: string
    x-enum-varnames:
    - SessionProtoHLS
    - SessionProtoDASH
    - SessionProtoRTMP
    - SessionProtoSRT
    - SessionProtoRTSP
  domain.StreamCodeFilter:
    properties:
      except:
        description: Except delivers events for all streams except those in this list.
        items:
          type: string
        type: array
      only:
        description: Only delivers events only for streams in this list.
        items:
          type: string
        type: array
    type: object
  domain.StreamDVRConfig:
    properties:
      enabled:
        type: boolean
      max_size_gb:
        description: |-
          MaxSizeGB caps total disk usage. Oldest segments pruned when exceeded.
          0 = no limit.
        type: number
      retention_sec:
        description: |-
          RetentionSec is the retention window in seconds.
          0 = keep forever.
        type: integer
      segment_duration:
        description: |-
          SegmentDuration overrides the global segment length in seconds.
          0 = use default (4s).
        type: integer
      storage_path:
        description: |-
          StoragePath overrides the default DVR root directory for this stream.
          "" = use "./dvr/{streamCode}".
        type: string
    type: object
  domain.StreamStatus:
    enum:
    - idle
    - active
    - degraded
    - stopped
    type: string
    x-enum-varnames:
    - StatusIdle
    - StatusActive
    - StatusDegraded
    - StatusStopped
  domain.ThumbnailConfig:
    properties:
      enabled:
        type: boolean
      height:
        type: integer
      interval_sec:
        description: IntervalSec generates one thumbnail every N seconds.
        type: integer
      output_dir:
        description: |-
          OutputDir is relative to the publisher HLS directory.
          E.g. "thumbnails" → written to {hls_dir}/{stream_code}/thumbnails/thumb.jpg
        type: string
      quality:
        description: 'Quality is the JPEG quality (1–31, lower = better). Default:
          5.'
        type: integer
      width:
        description: |-
          Width and Height of the output thumbnail in pixels.
          0 = match source resolution.
        type: integer
    type: object
  domain.TranscoderConfig:
    properties:
      audio:
        $ref: '#/definitions/domain.AudioTranscodeConfig'
      decoder:
        $ref: '#/definitions/domain.DecoderConfig'
      extra_args:
        description: |-
          ExtraArgs are raw FFmpeg arguments appended after the generated command.
          Use with caution — may conflict with generated arguments.
        items:
          type: string
        type: array
      global:
        $ref: '#/definitions/domain.TranscoderGlobalConfig'
      mode:
        allOf:
        - $ref: '#/definitions/domain.TranscoderMode'
        description: Mode selects the FFmpeg process topology. Empty = TranscoderModeMulti.
      video:
        $ref: '#/definitions/domain.VideoTranscodeConfig'
    type: object
  domain.TranscoderGlobalConfig:
    properties:
      deviceid:
        description: DeviceID selects hardware device index.
        type: integer
      fps:
        description: FPS sets output framerate. 0 = source/default.
        type: integer
      gop:
        description: GOP sets keyframe interval in frames. 0 = encoder default.
        type: integer
      hw:
        allOf:
        - $ref: '#/definitions/domain.HWAccel'
        description: HW selects the acceleration backend.
    type: object
  domain.TranscoderMode:
    enum:
    - multi
    - per_profile
    type: string
    x-enum-varnames:
    - TranscoderModeMulti
    - TranscoderModePerProfile
  domain.VODMount:
    properties:
      comment:
        type: string
      name:
        type: string
      storage:
        type: string
    type: object
  domain.VideoCodec:
    enum:
    - h264
    - h265
    - av1
    - vp9
    - copy
    type: string
    x-enum-comments:
      VideoCodecAV1: royalty-free, best compression (high CPU)
      VideoCodecCopy: passthrough — no re-encode
      VideoCodecH264: AVC — widest device support
      VideoCodecH265: HEVC — ~50% smaller than H.264
      VideoCodecVP9: Google codec, WebRTC-friendly
    x-enum-descriptions:
    - AVC — widest device support
    - HEVC — ~50% smaller than H.264
    - royalty-free, best compression (high CPU)
    - Google codec, WebRTC-friendly
    - passthrough — no re-encode
    x-enum-varnames:
    - VideoCodecH264
    - VideoCodecH265
    - VideoCodecAV1
    - VideoCodecVP9
    - VideoCodecCopy
  domain.VideoProfile:
    properties:
      bframes:
        description: |-
          Bframes is the number of consecutive B-frames the encoder may emit.
          nil = encoder default; 0 = explicit none (low-latency live);
          2-3 = typical VOD; NVENC HW B-ref pyramid is auto-enabled when >0.
        type: integer
      bitrate:
        description: Bitrate is the target video bitrate in kbps. 0 = encoder auto.
        type: integer
      codec:
        $ref: '#/definitions/domain.VideoCodec'
      framerate:
        description: Framerate is the output frame rate (fps). 0 = match source.
        type: number
      height:
        type: integer
      keyframe_interval:
        description: |-
          KeyframeInterval is the GOP size in seconds.
          Must match or be a multiple of the HLS/DASH segment duration.
        type: integer
      level:
        description: |-
          Level controls the H.264/H.265 encoding level.
          Common: "3.1", "4.0", "4.1", "4.2", "5.0", "5.1"
        type: string
      max_bitrate:
        description: MaxBitrate caps the peak bitrate in kbps (CBR/VBR ceiling). 0
          = no cap.
        type: integer
      preset:
        description: |-
          Preset controls the encoder speed/quality tradeoff.
          libx264: "ultrafast" | "superfast" | "veryfast" | "faster" | "fast" | "medium" | "slow" | "veryslow"
          NVENC:   "p1" (fastest) .. "p7" (highest quality)
        type: string
      profile:
        description: |-
          Profile controls the H.264/H.265 encoding profile.
          "baseline" | "main" | "high" (H.264); "main" | "main10" (H.265)
        type: string
      refs:
        description: |-
          Refs is the number of reference frames. nil = encoder default.
          Higher = better compression at cost of CPU/latency. NVENC has its own caps.
        type: integer
      resize_mode:
        allOf:
        - $ref: '#/definitions/domain.ResizeMode'
        description: |-
          ResizeMode chooses how the source is fitted to Width/Height.
          "" defaults to ResizeModePad.
      sar:
        description: |-
          SAR is the output Sample Aspect Ratio, "N:M". "" = inherit from source.
          Use "1:1" for square pixels (web); "16:11", "59:54" etc. for anamorphic.
        type: string
      width:
        description: |-
          Width and Height define the output resolution.
          Set to 0 to keep the source dimensions (Width=0 & Height=0 = no scaling).
        type: integer
    type: object
  domain.VideoTranscodeConfig:
    properties:
      copy:
        description: Copy copies origin video without re-encoding.
        type: boolean
      interlace:
        allOf:
        - $ref: '#/definitions/domain.InterlaceMode'
        description: |-
          Interlace selects the deinterlace pre-filter applied before scaling.
          Applies once per FFmpeg subprocess (i.e. per profile in the ABR ladder).
          "" disables the filter; use ResizeModeProgressive to assert progressive source.
      profiles:
        description: Profiles defines ABR renditions when re-encoding.
        items:
          $ref: '#/definitions/domain.VideoProfile'
        type: array
    type: object
  domain.WatermarkAsset:
    properties:
      content_type:
        description: |-
          ContentType is the MIME type sniffed at upload time
          (e.g. "image/png", "image/jpeg"). Used for Content-Type on /raw GET.
        type: string
      file_name:
        description: |-
          FileName is the original filename at upload time, preserved for
          audit / download responses. Includes extension (e.g. "logo.png").
        type: string
      id:
        description: ID is the immutable filesystem-safe identifier (also the on-disk
          basename).
        type: string
      name:
        description: |-
          Name is the human display label shown in UIs. Defaults to the upload's
          original filename when the operator doesn't override.
        type: string
      size_bytes:
        description: SizeBytes is the on-disk size of the image. Sidecar JSON is excluded.
        type: integer
      uploaded_at:
        description: UploadedAt is the wall-clock UTC time the asset was first stored.
        type: string
    type: object
  domain.WatermarkConfig:
    properties:
      asset_id:
        description: |-
          AssetID, when set, references a WatermarkAsset uploaded via the
          /watermarks API. Coordinator resolves it to an on-disk file path
          before passing the config to the transcoder. Takes precedence over
          ImagePath when both are set.
        type: string
      enabled:
        type: boolean
      font_color:
        description: FontColor in FFmpeg color syntax. E.g. "white", "#FFFFFF", "white@0.8".
        type: string
      font_file:
        description: |-
          FontFile is the path to a .ttf/.otf font file.
          "" = FFmpeg default font.
        type: string
      font_size:
        description: 'FontSize in pixels. Default: 24.'
        type: integer
      image_path:
        description: |-
          ImagePath is the absolute path to a watermark image (PNG with alpha
          recommended). Use this for assets pre-staged on the host outside the
          /watermarks library. Mutually exclusive with AssetID.
        type: string
      offset_x:
        description: |-
          OffsetX and OffsetY are pixel offsets from the chosen position edge.
          Ignored when Position == custom.
        type: integer
      offset_y:
        type: integer
      opacity:
        description: 'Opacity controls transparency: 0.0 = fully transparent, 1.0
          = fully opaque.'
        type: number
      position:
        allOf:
        - $ref: '#/definitions/domain.WatermarkPosition'
        description: |-
          Position selects how the (X, Y) of the overlay are computed:
            - top_left/top_right/bottom_left/bottom_right/center: convenience
              anchors. OffsetX/Y act as inward padding from the chosen edge
              (Center ignores offsets).
            - custom: X / Y below are used as raw FFmpeg expressions —
              pixel ints ("100"), expressions ("main_w-overlay_w-50"), or
              time-aware fades ("if(gt(t,5),10,-100)") all work.
      resize:
        description: |-
          Resize, when true, makes the watermark render at a consistent on-screen
          ratio across every rendition in an ABR ladder. The largest profile
          renders the asset at its NATIVE pixel size (operators design at the top
          rendition); smaller profiles shrink the asset by the ratio of their
          width to the largest profile's width. Pixel-scale fields (FontSize for
          text, OffsetX/OffsetY for both) shrink with the same factor so corner
          padding and glyph height stay visually proportional.

          When false (default), the watermark uses native pixel dimensions and
          fixed offsets on every profile — appearing larger on lower-resolution
          renditions because they cover fewer pixels of frame.
        type: boolean
      text:
        description: |-
          Text is the string to render. Supports strftime directives for live timestamps.
          E.g. "LIVE %{localtime:%H:%M:%S}"
        type: string
      type:
        $ref: '#/definitions/domain.WatermarkType'
      x:
        description: |-
          X / Y are raw FFmpeg coordinate expressions used only when Position
          == custom. Empty string defaults to "0". The exact variables exposed
          depend on the filter:
            - drawtext (text watermark): w/h = frame size, tw/th = text size
            - overlay (image watermark):  W/H = main video size, w/h = overlay size
        type: string
      "y":
        type: string
    type: object
  domain.WatermarkPosition:
    enum:
    - top_left
    - top_right
    - bottom_left
    - bottom_right
    - center
    - custom
    - bottom_right
    type: string
    x-enum-varnames:
    - WatermarkTopLeft
    - WatermarkTopRight
    - WatermarkBottomLeft
    - WatermarkBottomRight
    - WatermarkCenter
    - WatermarkCustom
    - defaultWatermarkPosition
  domain.WatermarkType:
    enum:
