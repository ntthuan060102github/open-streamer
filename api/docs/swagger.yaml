basePath: /
definitions:
  apidocs.ConfigData:
    properties:
      audio_codecs:
        items:
          $ref: '#/definitions/domain.AudioCodec'
        type: array
      global_config:
        $ref: '#/definitions/domain.GlobalConfig'
      hw_accels:
        items:
          $ref: '#/definitions/domain.HWAccel'
        type: array
      output_protocols:
        items:
          type: string
        type: array
      ports:
        $ref: '#/definitions/apidocs.ConfigPorts'
      stream_statuses:
        items:
          $ref: '#/definitions/domain.StreamStatus'
        type: array
      version:
        $ref: '#/definitions/version.Info'
      video_codecs:
        items:
          $ref: '#/definitions/domain.VideoCodec'
        type: array
      watermark_positions:
        items:
          $ref: '#/definitions/domain.WatermarkPosition'
        type: array
      watermark_types:
        items:
          $ref: '#/definitions/domain.WatermarkType'
        type: array
    type: object
  apidocs.ConfigPorts:
    properties:
      http_addr:
        type: string
      rtmp_port:
        type: integer
      rtsp_port:
        type: integer
      srt_port:
        type: integer
    type: object
  apidocs.ConfigUpdateResponse:
    properties:
      global_config:
        $ref: '#/definitions/domain.GlobalConfig'
      ports:
        $ref: '#/definitions/apidocs.ConfigPorts'
    type: object
  apidocs.ErrorBody:
    properties:
      error:
        properties:
          code:
            type: string
          message:
            type: string
        type: object
    type: object
  apidocs.ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          message:
            type: string
        type: object
    type: object
  apidocs.HookData:
    properties:
      data:
        $ref: '#/definitions/domain.Hook'
    type: object
  apidocs.HookList:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Hook'
        type: array
      total:
        type: integer
    type: object
  apidocs.HookTestData:
    properties:
      data:
        $ref: '#/definitions/apidocs.HookTestInner'
    type: object
  apidocs.HookTestInner:
    properties:
      at:
        type: string
      status:
        type: string
    type: object
  apidocs.InputSwitchRequest:
    properties:
      priority:
        type: integer
    type: object
  apidocs.RecordingData:
    properties:
      data:
        $ref: '#/definitions/domain.Recording'
    type: object
  apidocs.RecordingList:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Recording'
        type: array
      total:
        type: integer
    type: object
  apidocs.SessionList:
    properties:
      sessions:
        items:
          $ref: '#/definitions/domain.PlaySession'
        type: array
      stats:
        $ref: '#/definitions/apidocs.SessionStats'
      total_count:
        type: integer
    type: object
  apidocs.SessionStats:
    properties:
      active:
        type: integer
      closed_total:
        type: integer
      idle_closed_total:
        type: integer
      kicked_total:
        type: integer
      opened_total:
        type: integer
    type: object
  apidocs.StreamActionData:
    properties:
      data:
        $ref: '#/definitions/apidocs.StreamActionInner'
    type: object
  apidocs.StreamActionInner:
    properties:
      status:
        type: string
    type: object
  apidocs.StreamData:
    properties:
      data:
        $ref: '#/definitions/apidocs.StreamResponse'
    type: object
  apidocs.StreamList:
    properties:
      data:
        items:
          $ref: '#/definitions/apidocs.StreamResponse'
        type: array
      total:
        type: integer
    type: object
  apidocs.StreamPutRequest:
    properties:
      description:
        type: string
      disabled:
        type: boolean
      dvr:
        $ref: '#/definitions/domain.StreamDVRConfig'
      inputs:
        items:
          $ref: '#/definitions/domain.Input'
        type: array
      name:
        type: string
      protocols:
        $ref: '#/definitions/domain.OutputProtocols'
      push:
        items:
          $ref: '#/definitions/domain.PushDestination'
        type: array
      stream_key:
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail:
        $ref: '#/definitions/domain.ThumbnailConfig'
      transcoder:
        $ref: '#/definitions/domain.TranscoderConfig'
      watermark:
        $ref: '#/definitions/domain.WatermarkConfig'
    type: object
  apidocs.StreamResponse:
    properties:
      code:
        description: Code is the unique key chosen by the user ([a-zA-Z0-9_]).
        type: string
      description:
        type: string
      disabled:
        description: Disabled when true excludes the stream from server bootstrap
          and rejects pipeline Start.
        type: boolean
      dvr:
        allOf:
        - $ref: '#/definitions/domain.StreamDVRConfig'
        description: |-
          DVR overrides the global DVR settings for this specific stream.
          If nil, the global config is used (when DVR is enabled globally).
      inputs:
        description: |-
          Inputs are the available ingest sources ordered by Priority.
          The Stream Manager monitors health and switches between them on failure.
        items:
          $ref: '#/definitions/domain.Input'
        type: array
      name:
        type: string
      protocols:
        allOf:
        - $ref: '#/definitions/domain.OutputProtocols'
        description: |-
          Protocols defines which delivery protocols are opened for this stream.
          The server opens a listener/packager for each enabled protocol.
          Protocol-level config (ports, segment duration, CDN URL) lives in server config.
      push:
        description: |-
          Push is the list of external destinations the server actively pushes to.
          Each entry defines one push target (YouTube, Facebook, Twitch, CDN relay, etc.).
        items:
          $ref: '#/definitions/domain.PushDestination'
        type: array
      runtime:
        $ref: '#/definitions/manager.RuntimeStatus'
      stream_key:
        description: StreamKey is used to authenticate RTMP/SRT push ingest.
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail:
        allOf:
        - $ref: '#/definitions/domain.ThumbnailConfig'
        description: Thumbnail controls periodic screenshot generation for preview
          images.
      transcoder:
        allOf:
        - $ref: '#/definitions/domain.TranscoderConfig'
        description: |-
          Transcoder controls encoding/decoding settings.
          nil means no transcoding for this stream.
      watermark:
        allOf:
        - $ref: '#/definitions/domain.WatermarkConfig'
        description: Watermark is an optional text or image overlay applied before
          encoding.
    type: object
  apidocs.VODFileData:
    properties:
      data:
        $ref: '#/definitions/vod.FileEntry'
    type: object
  apidocs.VODFileList:
    properties:
      data:
        items:
          $ref: '#/definitions/vod.FileEntry'
        type: array
      path:
        type: string
      total:
        type: integer
    type: object
  apidocs.VODMountData:
    properties:
      data:
        $ref: '#/definitions/domain.VODMount'
    type: object
  apidocs.VODMountList:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.VODMount'
        type: array
      total:
        type: integer
    type: object
  apidocs.WatermarkAssetData:
    properties:
      data:
        $ref: '#/definitions/domain.WatermarkAsset'
    type: object
  apidocs.WatermarkAssetList:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.WatermarkAsset'
        type: array
      dir:
        type: string
      total:
        type: integer
    type: object
  config.BufferConfig:
    properties:
      capacity:
        description: Capacity is the number of MPEG-TS packets per stream buffer.
        type: integer
    type: object
  config.CORSConfig:
    properties:
      allow_credentials:
        description: |-
          AllowCredentials sets Access-Control-Allow-Credentials. Must be false
          when AllowedOrigins contains "*".
        type: boolean
      allowed_headers:
        description: AllowedHeaders lists Access-Control-Allow-Headers; empty uses
          a common API default set.
        items:
          type: string
        type: array
      allowed_methods:
        description: AllowedMethods lists Access-Control-Allow-Methods; empty uses
          a REST default set.
        items:
          type: string
        type: array
      allowed_origins:
        description: |-
          AllowedOrigins lists values for Access-Control-Allow-Origin. Use "*"
          for any origin (cannot be used together with AllowCredentials).
        items:
          type: string
        type: array
      enabled:
        description: Enabled turns CORS middleware on for the HTTP listener.
        type: boolean
      exposed_headers:
        description: ExposedHeaders lists Access-Control-Expose-Headers.
        items:
          type: string
        type: array
      max_age:
        description: MaxAge is the preflight cache duration in seconds (Access-Control-Max-Age).
        type: integer
    type: object
  config.HooksConfig:
    properties:
      batch_flush_interval_sec:
        description: |-
          BatchFlushIntervalSec is the global default for the per-hook flush
          timer in seconds. Per-hook overrides win; code default is
          DefaultHookBatchFlushIntervalSec.
        type: integer
      batch_max_items:
        description: |-
          BatchMaxItems is the global default for HTTP hook batch size.
          Per-hook BatchMaxItems overrides this; the code default
          (DefaultHookBatchMaxItems) wins only when both are 0.
        type: integer
      batch_max_queue_items:
        description: |-
          BatchMaxQueueItems is the global default for the per-hook in-memory
          queue cap. Per-hook overrides win; code default is
          DefaultHookBatchMaxQueueItems.
        type: integer
      worker_count:
        description: |-
          WorkerCount sizes the events.Bus worker pool that fans events out
          to subscribers. Each worker invokes the registered handler for an
          incoming event; with the batched HTTP delivery, the hook handler
          just enqueues into a per-hook batcher (~µs) so this number rarely
          needs tuning. 1-4 covers nearly every workload. 0 = use 4.
        type: integer
    type: object
  config.IngestorConfig:
    properties:
      hls_max_segment_buffer:
        description: |-
          HLSMaxSegmentBuffer caps the number of pre-fetched HLS segments held in memory.
          This is a server-wide memory guard, not a per-stream policy.
        type: integer
    type: object
  config.ListenersConfig:
    properties:
      rtmp:
        $ref: '#/definitions/config.RTMPListenerConfig'
      rtsp:
        $ref: '#/definitions/config.RTSPListenerConfig'
      srt:
        $ref: '#/definitions/config.SRTListenerConfig'
    type: object
  config.LogConfig:
    properties:
      format:
        description: text | json
        type: string
      level:
        description: debug | info | warn | error
        type: string
    type: object
  config.ManagerConfig:
    properties:
      input_packet_timeout_sec:
        description: |-
          InputPacketTimeoutSec is the maximum gap without a successful read on the
          active input before it is marked failed. Pull protocols that deliver in
          bursts (e.g. HLS: one segment per Read) need this at least as large as the
          typical interval between reads (segment duration + playlist poll), or a
          healthy primary will be falsely failed over to a lower priority.
        type: integer
    type: object
  config.PublisherConfig:
    properties:
      dash:
        $ref: '#/definitions/config.PublisherDASHConfig'
      hls:
        $ref: '#/definitions/config.PublisherHLSConfig'
    type: object
  config.PublisherDASHConfig:
    properties:
      dir:
        type: string
      live_ephemeral:
        description: Live* mirror HLS packaging semantics for the DASH muxer.
        type: boolean
      live_history:
        type: integer
      live_segment_sec:
        type: integer
      live_window:
        type: integer
    type: object
  config.PublisherHLSConfig:
    properties:
      dir:
        type: string
      live_ephemeral:
        description: LiveEphemeral enables bounded retention (sliding manifest, delete
          old segments).
        type: boolean
      live_history:
        description: LiveHistory is extra segments kept on disk after they leave the
          manifest.
        type: integer
      live_segment_sec:
        description: LiveSegmentSec is segment duration in seconds.
        type: integer
      live_window:
        description: LiveWindow is the sliding window size (segments) in the playlist.
        type: integer
    type: object
  config.RTMPListenerConfig:
    properties:
      enabled:
        type: boolean
      listen_host:
        type: string
      port:
        description: default 1935
        type: integer
    type: object
  config.RTSPListenerConfig:
    properties:
      enabled:
        type: boolean
      listen_host:
        type: string
      port:
        description: default 554
        type: integer
      transport:
        description: Transport is "tcp" (default) or "udp" for the RTSP muxer.
        type: string
    type: object
  config.SRTListenerConfig:
    properties:
      enabled:
        type: boolean
      latency_ms:
        description: LatencyMS is the SRT latency in milliseconds applied to the listener.
        type: integer
      listen_host:
        type: string
      port:
        description: default 9999
        type: integer
    type: object
  config.ServerConfig:
    properties:
      cors:
        $ref: '#/definitions/config.CORSConfig'
      http_addr:
        type: string
    type: object
  config.SessionsConfig:
    properties:
      enabled:
        description: |-
          Enabled toggles the entire feature. When false, the tracker no-ops and
          the API endpoints return empty.
        type: boolean
      geoip_db_path:
        description: |-
          GeoIPDBPath is reserved for future MaxMind/IP2Location integration.
          Currently unused — the default GeoIP resolver is a no-op (Country="").
          Operators wanting GeoIP can wire their own resolver via DI.
        type: string
      idle_timeout_sec:
        description: |-
          IdleTimeoutSec is how long a session may go without activity before the
          reaper closes it. Default 30 s when <= 0.
        type: integer
      max_lifetime_sec:
        description: |-
          MaxLifetimeSec, when > 0, hard-closes any session older than this even
          if it's still seeing activity. 0 disables the cap.
        type: integer
    type: object
  config.TranscoderConfig:
    properties:
      ffmpeg_path:
        type: string
    type: object
  config.WatermarksConfig:
    properties:
      dir:
        description: |-
          Dir is the assets directory. Must be writable by the open-streamer
          process. Defaults to "./watermarks" when empty (matches the layout
          install scripts use under /var/lib/open-streamer/watermarks).
        type: string
    type: object
  domain.AudioCodec:
    enum:
    - aac
    - mp3
    - opus
    - ac3
    - copy
    type: string
    x-enum-comments:
      AudioCodecAAC: default for HLS/DASH
      AudioCodecAC3: Dolby Digital — broadcast use
      AudioCodecCopy: passthrough — no re-encode
      AudioCodecMP3: legacy compatibility
      AudioCodecOpus: best for WebRTC / low-latency
    x-enum-descriptions:
    - default for HLS/DASH
    - legacy compatibility
    - best for WebRTC / low-latency
    - Dolby Digital — broadcast use
    - passthrough — no re-encode
    x-enum-varnames:
    - AudioCodecAAC
    - AudioCodecMP3
    - AudioCodecOpus
    - AudioCodecAC3
    - AudioCodecCopy
  domain.AudioTranscodeConfig:
    properties:
      bitrate:
        description: Bitrate is the audio bitrate in kbps.
        type: integer
      channels:
        description: 'Channels: 1 = mono, 2 = stereo, 6 = 5.1.'
        type: integer
      codec:
        $ref: '#/definitions/domain.AudioCodec'
      copy:
        description: Copy copies origin audio without re-encoding.
        type: boolean
      language:
        description: Language is ISO 639-1 code, e.g. "en", "vi".
        type: string
      normalize:
        description: Normalize applies EBU R128 loudness normalization.
        type: boolean
      sample_rate:
        description: SampleRate is output sample rate in Hz.
        type: integer
    type: object
  domain.DecoderConfig:
    properties:
      name:
        description: |-
          Name is the FFmpeg decoder name.
          "" = let FFmpeg choose automatically.
          Examples: "h264_cuvid", "h264_qsv".
        type: string
    type: object
  domain.ErrorEntry:
    properties:
      at:
        type: string
      message:
        type: string
    type: object
  domain.EventType:
    enum:
    - session.opened
    - session.closed
    - stream.created
    - stream.started
    - stream.stopped
    - stream.deleted
    - input.connected
    - input.reconnecting
    - input.degraded
    - input.failed
    - input.failover
    - recording.started
    - recording.stopped
    - recording.failed
    - segment.written
    - transcoder.started
    - transcoder.stopped
    - transcoder.error
    type: string
    x-enum-comments:
      EventInputConnected: source connected successfully
      EventInputDegraded: error detected by manager
      EventInputFailed: worker exited / non-retriable
      EventInputFailover: switched to lower-priority input
      EventInputReconnecting: transient error, retrying
    x-enum-descriptions:
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - source connected successfully
    - transient error, retrying
    - error detected by manager
    - worker exited / non-retriable
    - switched to lower-priority input
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    x-enum-varnames:
    - EventSessionOpened
    - EventSessionClosed
    - EventStreamCreated
    - EventStreamStarted
    - EventStreamStopped
    - EventStreamDeleted
    - EventInputConnected
    - EventInputReconnecting
    - EventInputDegraded
    - EventInputFailed
    - EventInputFailover
    - EventRecordingStarted
    - EventRecordingStopped
    - EventRecordingFailed
    - EventSegmentWritten
    - EventTranscoderStarted
    - EventTranscoderStopped
    - EventTranscoderError
  domain.GlobalConfig:
    properties:
      buffer:
        $ref: '#/definitions/config.BufferConfig'
      hooks:
        $ref: '#/definitions/config.HooksConfig'
      ingestor:
        $ref: '#/definitions/config.IngestorConfig'
      listeners:
        $ref: '#/definitions/config.ListenersConfig'
      log:
        $ref: '#/definitions/config.LogConfig'
      manager:
        $ref: '#/definitions/config.ManagerConfig'
      publisher:
        $ref: '#/definitions/config.PublisherConfig'
      server:
        $ref: '#/definitions/config.ServerConfig'
      sessions:
        $ref: '#/definitions/config.SessionsConfig'
      transcoder:
        $ref: '#/definitions/config.TranscoderConfig'
      watermarks:
        $ref: '#/definitions/config.WatermarksConfig'
    type: object
  domain.HWAccel:
    enum:
    - none
    - nvenc
    - vaapi
    - videotoolbox
    - qsv
    type: string
    x-enum-comments:
      HWAccelNVENC: NVIDIA GPU (h264_nvenc, hevc_nvenc)
      HWAccelNone: CPU only (libx264, libx265)
      HWAccelQSV: Intel Quick Sync Video
      HWAccelVAAPI: Intel/AMD GPU via VA-API (Linux)
      HWAccelVideoToolbox: Apple GPU (macOS)
    x-enum-descriptions:
    - CPU only (libx264, libx265)
    - NVIDIA GPU (h264_nvenc, hevc_nvenc)
    - Intel/AMD GPU via VA-API (Linux)
    - Apple GPU (macOS)
    - Intel Quick Sync Video
    x-enum-varnames:
    - HWAccelNone
    - HWAccelNVENC
    - HWAccelVAAPI
    - HWAccelVideoToolbox
    - HWAccelQSV
  domain.Hook:
    properties:
      batch_flush_interval_sec:
        description: |-
          BatchFlushIntervalSec is the maximum time a batch may sit before being
          flushed even when below BatchMaxItems. 0 = use HooksConfig default,
          then DefaultHookBatchFlushIntervalSec.
        type: integer
      batch_max_items:
        description: |-
          BatchMaxItems caps the number of events bundled into one HTTP POST
          body. 0 = use HooksConfig.BatchMaxItems, then DefaultHookBatchMaxItems.
          Ignored for File hooks (they always write one event per line).
        type: integer
      batch_max_queue_items:
        description: |-
          BatchMaxQueueItems caps the per-hook in-memory queue (pending +
          re-queued failures). When exceeded, the OLDEST events are dropped
          with a warning log so the queue never grows unbounded against an
          unreachable target. 0 = use HooksConfig default, then
          DefaultHookBatchMaxQueueItems.
        type: integer
      enabled:
        type: boolean
      event_types:
        description: EventTypes filters which events trigger delivery. Empty = all
          events.
        items:
          $ref: '#/definitions/domain.EventType'
        type: array
      id:
        type: string
      max_retries:
        description: |-
          MaxRetries is the number of delivery attempts before giving up.
          0 means use the server default (3). For HTTP hooks this caps retries
          inside a single batch flush; events that still fail are re-queued
          for the next flush regardless of MaxRetries.
        type: integer
      metadata:
        additionalProperties:
          type: string
        description: |-
          Metadata holds user-defined key-value pairs merged into every event payload
          delivered by this hook. Useful for tagging events with custom context
          (e.g. environment, tenant ID, region) without modifying the server config.
        type: object
      name:
        type: string
      secret:
        description: HMAC-SHA256 signing secret (HTTP only)
        type: string
      stream_codes:
        allOf:
        - $ref: '#/definitions/domain.StreamCodeFilter'
        description: |-
          StreamCodes filters delivery by stream code.
          Only and Except are mutually exclusive; Only takes precedence when both are set.
          Omitting the field (nil) means all streams are included.
      target:
        description: HTTP(S) URL or absolute file path
        type: string
      timeout_sec:
        description: |-
          TimeoutSec is the per-attempt delivery timeout in seconds.
          0 means use the server default (10s).
        type: integer
      type:
        $ref: '#/definitions/domain.HookType'
    type: object
  domain.HookType:
    enum:
    - http
    - file
    type: string
    x-enum-varnames:
    - HookTypeHTTP
    - HookTypeFile
  domain.Input:
    properties:
      headers:
        additionalProperties:
          type: string
        description: |-
          Headers are arbitrary HTTP headers sent with every request for HTTP/HLS inputs.
          Common uses:
            "Authorization": "Bearer <token>"
            "Authorization": "Basic <base64(user:pass)>"
            "X-Custom-Token": "secret"
        type: object
      net:
        allOf:
        - $ref: '#/definitions/domain.InputNetConfig'
        description: Net controls reconnect and timeout behaviour.
      params:
        additionalProperties:
          type: string
        description: |-
          Params are extra URL query parameters merged into the source URL before
          connecting. Used for protocols that carry credentials or options in the
          query string (SRT ?passphrase=, S3 ?access_key= / ?secret_key=, etc.).
            "passphrase": "my-srt-passphrase"
            "access_key": "AKID..."   (S3)
            "secret_key": "wJal..."   (S3)
        type: object
      priority:
        description: |-
          Priority determines failover order. Lower value = higher priority.
          The Stream Manager always prefers the lowest-priority alive input.
        type: integer
      url:
        description: URL is the source endpoint. See the package doc for supported
          formats.
        type: string
    type: object
  domain.InputNetConfig:
    properties:
      insecure_tls:
        description: |-
          InsecureTLS disables TLS certificate verification for HTTPS pulls
          (HLS playlist + segment GETs). Default false — leave secure-by-default
          for production. Use only when the source uses a self-signed,
          expired, or otherwise-invalid certificate that you trust at the
          network level (private VLAN, fixed IP allowlist).
        type: boolean
      timeout_sec:
        description: |-
          TimeoutSec is the per-protocol operation budget the reader applies
          when this input is opened. Semantics differ by protocol:

            - HLS:  HTTP request timeout (entire round-trip incl. body) for
                    the playlist GET. Segment GETs derive from this — typically
                    4× the playlist budget, floored at the segment default.
            - RTMP: TCP dial timeout (handshake budget).
            - RTSP: dial + initial read timeout (until first packet).
            - SRT:  connection / handshake timeout.

          Zero uses the reader's per-protocol default
          (DefaultHLSPlaylistTimeoutSec for HLS; DefaultRTMPTimeoutSec /
          DefaultRTSPTimeoutSec for the rest).
        type: integer
    type: object
  domain.InterlaceMode:
    enum:
    - auto
    - tff
    - bff
    - progressive
    type: string
    x-enum-comments:
      InterlaceAuto: detect parity each frame
      InterlaceBottomField: bottom field first (legacy DV)
      InterlaceProgressive: assert source is progressive — skip filter
      InterlaceTopField: top field first (BBC HD, most ATSC)
    x-enum-descriptions:
    - detect parity each frame
    - top field first (BBC HD, most ATSC)
    - bottom field first (legacy DV)
    - assert source is progressive — skip filter
    x-enum-varnames:
    - InterlaceAuto
    - InterlaceTopField
    - InterlaceBottomField
    - InterlaceProgressive
  domain.MediaTrackInfo:
    properties:
      bitrate_kbps:
        type: integer
      codec:
        description: '"h264" | "h265" | "aac"'
        type: string
      height:
        description: video only
        type: integer
      kind:
        $ref: '#/definitions/domain.MediaTrackKind'
      width:
        description: video only
        type: integer
    type: object
  domain.MediaTrackKind:
    enum:
    - video
    - audio
    type: string
    x-enum-varnames:
    - MediaTrackVideo
    - MediaTrackAudio
  domain.OutputProtocols:
    properties:
      dash:
        description: |-
          DASH enables MPEG-DASH packaging over HTTP.
          Required for Widevine/PlayReady DRM.
        type: boolean
      hls:
        description: |-
          HLS enables Apple HTTP Live Streaming (m3u8 + segments over HTTP).
          Compatible with browsers, iOS, Android, Smart TVs.
        type: boolean
      rtmp:
        description: RTMP opens an RTMP publish endpoint for legacy players/CDNs.
        type: boolean
      rtsp:
        description: RTSP opens an RTSP listener for pull clients (VLC, broadcast
          tools).
        type: boolean
      srt:
        description: SRT opens an SRT listener port for contribution-quality pull.
        type: boolean
    type: object
  domain.PlaySession:
    properties:
      bytes:
        description: |-
          Bytes is the cumulative bytes sent to this client since session open.
          HLS/DASH: sum of segment + manifest response bodies. RTMP/SRT: write
          bytes from the publisher's outbound pipeline.
        type: integer
      close_reason:
        allOf:
        - $ref: '#/definitions/domain.SessionCloseReason'
        description: CloseReason explains why the session ended. Empty while active.
      closed_at:
        description: ClosedAt is set when the session ends. nil while active.
        type: string
      country:
        description: |-
          Country is an ISO 3166-1 alpha-2 country code from the configured
          GeoIP resolver, or "" when GeoIP is disabled / lookup failed.
        type: string
      dvr:
        description: |-
          DVR is true when playback originated from the DVR window (timeshift),
          false for live edge. Open-Streamer's DVR delivery is not yet routed
          through here so this is currently always false; field reserved.
        type: boolean
      id:
        description: |-
          ID uniquely identifies the session across the server's lifetime. For
          segment protocols (HLS/DASH) it is the deterministic fingerprint hash
          (so reconnects within the idle window collapse onto one session); for
          connection-bound protocols (RTMP/SRT/RTSP) it is a random UUID.
        type: string
      ip:
        description: |-
          IP is the remote peer address (no port). For HTTP-based protocols this
          is the X-Forwarded-For head when present, otherwise the RemoteAddr.
        type: string
      named_by:
        allOf:
        - $ref: '#/definitions/domain.SessionNamedBy'
        description: NamedBy records how UserName was resolved.
      opened_at:
        description: OpenedAt is the time the first activity for this session was
          observed.
        type: string
      proto:
        allOf:
        - $ref: '#/definitions/domain.SessionProto'
        description: Protocol is the wire protocol used to deliver this session.
      query_string:
        description: |-
          QueryString is the raw query of the FIRST request that opened the
          session (HLS/DASH) — useful when token/abr-variant info is encoded there.
        type: string
      referer:
        description: Referer is the HTTP Referer when present (HLS/DASH only).
        type: string
      secure:
        description: Secure is true when the underlying transport was TLS / SRTS /
          RTMPS.
        type: boolean
      started_at:
        description: |-
          StartedAt is when the first byte of media was delivered (segment data
          for HLS/DASH, first frame after RTMP play handshake). Zero before
          media flows.
        type: string
      stream_code:
        description: StreamCode is the foreign key to Stream.Code.
        type: string
      token:
        description: |-
          Token is the value of `?token=` from the first request, when present.
          When set, NamedBy is SessionNamedByToken.
        type: string
      updated_at:
        description: |-
          UpdatedAt is the time of the most recent activity. Idle reaper closes
          sessions whose UpdatedAt is older than (now - idle_timeout).
        type: string
      user_agent:
        description: |-
          UserAgent is the browser/player User-Agent (HTTP) or the equivalent
          flashVer field for RTMP. May be empty.
        type: string
      user_name:
        description: |-
          UserName is a human label. Resolved from token claims if available,
          otherwise the fingerprint hash short form. Empty when no identity could
          be resolved.
        type: string
    type: object
  domain.PushDestination:
    properties:
      comment:
        description: Comment is a human-readable note for this destination.
        type: string
      enabled:
        description: Enabled controls whether this destination is active.
        type: boolean
      limit:
        description: Limit is the maximum number of retry attempts. 0 = unlimited.
        type: integer
      retry_timeout_sec:
        description: RetryTimeoutSec is the delay between retry attempts in seconds.
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/domain.PushStatus'
        description: |-
          Status is a runtime-only field updated by the publisher.
          Not persisted to storage.
      timeout_sec:
        description: TimeoutSec is the connection/write timeout in seconds.
        type: integer
      url:
        description: |-
          URL is the destination ingest endpoint.
          Supported schemes:
            rtmp://  — plain TCP, default port 1935 (e.g. rtmp://a.rtmp.youtube.com/live2/{key})
            rtmps:// — TLS-wrapped RTMP, default port 443 (e.g. rtmps://live-api-s.facebook.com:443/rtmp/{key})
        type: string
    type: object
  domain.PushStatus:
    enum:
    - idle
    - connecting
    - active
    - retrying
    - failed
    - disabled
    type: string
    x-enum-varnames:
    - PushStatusIdle
    - PushStatusConnecting
    - PushStatusActive
    - PushStatusRetrying
    - PushStatusFailed
    - PushStatusDisabled
  domain.Recording:
    properties:
      id:
