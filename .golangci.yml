version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - exhaustive
    - misspell
    - bodyclose
    - contextcheck
    - noctx
    - godot
    - unparam
    - prealloc
    - nilerr

# gofumpt is a formatter in v2, not a linter — see https://golangci-lint.run/docs/formatters/
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: github.com/open-streamer/open-streamer

linters-settings:
  exhaustive:
    default-signifies-exhaustive: false
    check:
      - switch

  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

  godot:
    scope: declarations
    capital: false

issues:
  exclude-rules:
    # Allow fmt.Errorf without %w in test files
    - path: _test\.go
      linters:
        - errcheck
    # Allow TODO comments in handlers/stores during scaffolding
    - text: "TODO"
      linters:
        - godot
