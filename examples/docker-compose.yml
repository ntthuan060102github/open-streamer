services:
  open-streamer:
    build:
      context: ..
      dockerfile: build/Dockerfile
    ports:
      - "8080:8080"      # REST API + HLS/DASH static serving
      - "1935:1935"      # RTMP — shared port for push ingest + play
      # - "9999:9999/udp"  # SRT — shared port for push ingest + play
      # - "8554:8554"      # RTSP — shared port for play (and any future ingest)
      # - "9091:9091"      # Prometheus metrics
    environment:
      # Only OPEN_STREAMER_STORAGE_* env vars are honored — they pick the
      # storage backend at boot. All other runtime settings (server, listeners,
      # ingestor, transcoder, publisher, hooks, log, ...) live in the persisted
      # GlobalConfig in the store (seeded from ./data/open_streamer.json on
      # first boot, then editable via REST: GET/POST /config).
      OPEN_STREAMER_STORAGE_DRIVER: "json"
      OPEN_STREAMER_STORAGE_JSON_DIR: "/data"
    volumes:
      - ./data:/data          # JSON store (open_streamer.json lives here)
      # - ./out/hls:/out/hls    # HLS segments
      # - ./out/dash:/out/dash  # DASH segments
      # - ./out/dvr:/out/dvr    # DVR recordings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

